name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i "s/__PASSWORD_HASH__/${{ secrets.PASSWORD_HASH }}/g" docs/auth.js
          sed -i "s/__APP_TOKEN__/${{ secrets.APP_TOKEN }}/g" docs/github-api.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
