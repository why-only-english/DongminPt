<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동민PT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1 class="logo">🏋️ 동민PT</h1>
    <span></span>
  </header>

  <main class="container">
    <div id="weeks-grid" class="weeks-grid"></div>
  </main>

  <button id="btn-add-week" class="fab">+ 주차 추가</button>

  <div id="loading" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
    <p id="loading-msg">불러오는 중...</p>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Password Screen -->
  <div id="password-screen" style="display:none">
    <div class="pw-box">
      <h2>🏋️ 동민PT</h2>
      <p>비밀번호를 입력하세요</p>
      <form id="password-form">
        <input id="input-password" type="password" placeholder="••••••••" autofocus required />
        <p id="pw-error" class="pw-error"></p>
        <button type="submit" class="btn-primary">입장</button>
      </form>
    </div>
  </div>

  <!-- Add Week Modal -->
  <div id="add-week-modal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <h2>📅 주차 추가</h2>
        <button class="modal-close" onclick="closeModal('add-week-modal')">✕</button>
      </div>
      <form id="add-week-form">
        <label>주차 이름
          <input id="input-week-title" type="text" placeholder="예: 6월 2주차" required />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('add-week-modal')">취소</button>
          <button type="submit" class="btn-primary">추가</button>
        </div>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="github-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
